<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="Estilização_login.css">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');
    </style>    
</head>

<body>
<!--Cabeçalho-->
    <section>
        <h1>Olá, bem vindo de volta</h1>
        <h3>Insira suas informações abaixo</h3>
    </section>
<!--Formulário-->
    <section>
     <form>
            <label for="name">Nome:</label>
        <input type="text" id="name" placeholder="Digite o seu nome aqui..."><br>
            <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite o seu email aqui..."><br>
            <label for="password">Senha:</label>
        <input type="password" id="password" placeholder="Digite sua senha aqui..."><br>
        <button>Enviar</button>
     </form>
    </section>
</body>
</html>
